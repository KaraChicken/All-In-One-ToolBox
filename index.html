
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SmartTool Hub - Android Edition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --md-sys-color-primary: #10b981;
      --md-sys-color-on-primary: #ffffff;
      --md-sys-color-surface: #f7f9f7;
      --md-sys-color-surface-variant: #e1e9e1;
      --md-sys-color-on-surface: #191c19;
      --md-sys-color-outline: #717971;
    }
    body { 
      font-family: 'Plus Jakarta Sans', 'Roboto', sans-serif; 
      background-color: var(--md-sys-color-surface);
      color: var(--md-sys-color-on-surface);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    /* Android Style Ripple Effect Simulation */
    .ripple {
      position: relative;
      overflow: hidden;
    }
    .ripple:active::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      background: rgba(0, 0, 0, 0.05);
      pointer-events: none;
    }
    /* Material 3 Card */
    .m3-card {
      background: #ffffff;
      border-radius: 28px;
      transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
    }
    .m3-card-tonal {
      background: #e8f5e9;
      border-radius: 28px;
    }
    /* Smooth Scroll */
    .smooth-scroll {
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }
    /* Hide scrollbar for mobile nav */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Android Navigation Bar Height for Mobile */
    @media (max-width: 768px) {
      .pb-safe-nav { padding-bottom: 80px; }
    }
  </style>
<script type="importmap">

    "@ffmpeg/util": "https://esm.sh/@ffmpeg/util@0.12.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
