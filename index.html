  <script>
    // Prevent errors where libraries or ESM loaders try to reassign window.fetch
    (function() {
      const originalFetch = window.fetch;
      let currentFetch = originalFetch;
      try {
        Object.defineProperty(window, 'fetch', {
          get() {
            return currentFetch;
          },
          set(val) {
            currentFetch = val;
          },
          configurable: true,
          enumerable: true
        });
      } catch (e) {
        console.warn('Failed to define fetch property wrapper:', e);
      }
    })();
  </script>

    /* Android Style Ripple Effect Simulation */
    .ripple {
      position: relative;
      overflow: hidden;
    }
    .ripple:active::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      background: rgba(0, 0, 0, 0.05);
      pointer-events: none;
    }
    /* Material 3 Card */
    .m3-card {
      background: #ffffff;
      border-radius: 28px;
      transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
    }
    .m3-card-tonal {
      background: #e8f5e9;
      border-radius: 28px;
    }
    /* Smooth Scroll */
    .smooth-scroll {
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }
    /* Hide scrollbar for mobile nav */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Android Navigation Bar Height for Mobile */
    @media (max-width: 768px) {
      .pb-safe-nav { padding-bottom: 80px; }
    }
